apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: multiplai-ingress
  namespace: multiplai
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  tls:
    - hosts:
        - multiplai.com.br
        - admin.multiplai.com.br
        - api.multiplai.com.br
      secretName: multiplai-tls
  rules:
    # -----------------------------------------------
    # multiplai.com.br — PublicUI + CMSAPI.Publica
    # -----------------------------------------------
    - host: multiplai.com.br
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: cmsapi-publica
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: publicui
                port:
                  number: 8080

    # -----------------------------------------------
    # api.multiplai.com.br — CMSAPI.Publica (integração externa)
    # -----------------------------------------------
    - host: api.multiplai.com.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cmsapi-publica
                port:
                  number: 8080

    # -----------------------------------------------
    # admin.multiplai.com.br — CMSUI + CMSAPI
    # -----------------------------------------------
    - host: admin.multiplai.com.br
      http:
        paths:
          # API endpoints (PascalCase — [Route("[controller]")])
          - path: /Auth
            pathType: Prefix
            backend:
              service:
                name: cmsapi
                port:
                  number: 8080
          - path: /Usuarios
            pathType: Prefix
            backend:
              service:
                name: cmsapi
                port:
                  number: 8080
          - path: /Aplicacaos
            pathType: Prefix
            backend:
              service:
                name: cmsapi
                port:
                  number: 8080
          - path: /Dashboard
            pathType: Prefix
            backend:
              service:
                name: cmsapi
                port:
                  number: 8080
          - path: /Modulos
            pathType: Prefix
            backend:
              service:
                name: cmsapi
                port:
                  number: 8080
          - path: /Conteudos
            pathType: Prefix
            backend:
              service:
                name: cmsapi
                port:
                  number: 8080
          - path: /Areas
            pathType: Prefix
            backend:
              service:
                name: cmsapi
                port:
                  number: 8080
          - path: /Categorias
            pathType: Prefix
            backend:
              service:
                name: cmsapi
                port:
                  number: 8080
          - path: /Produtos
            pathType: Prefix
            backend:
              service:
                name: cmsapi
                port:
                  number: 8080
          - path: /Formularios
            pathType: Prefix
            backend:
              service:
                name: cmsapi
                port:
                  number: 8080
          - path: /Grupos
            pathType: Prefix
            backend:
              service:
                name: cmsapi
                port:
                  number: 8080
          - path: /vinculos
            pathType: Prefix
            backend:
              service:
                name: cmsapi
                port:
                  number: 8080
          - path: /vinculosmodulo
            pathType: Prefix
            backend:
              service:
                name: cmsapi
                port:
                  number: 8080
          - path: /PageBuilder
            pathType: Prefix
            backend:
              service:
                name: cmsapi
                port:
                  number: 8080
          - path: /Wiki
            pathType: Prefix
            backend:
              service:
                name: cmsapi
                port:
                  number: 8080
          - path: /Faq
            pathType: Prefix
            backend:
              service:
                name: cmsapi
                port:
                  number: 8080
          - path: /Site
            pathType: Prefix
            backend:
              service:
                name: cmsapi
                port:
                  number: 8080
          - path: /LayoutTemplates
            pathType: Prefix
            backend:
              service:
                name: cmsapi
                port:
                  number: 8080
          - path: /Pedidos
            pathType: Prefix
            backend:
              service:
                name: cmsapi
                port:
                  number: 8080
          - path: /Orcamentos
            pathType: Prefix
            backend:
              service:
                name: cmsapi
                port:
                  number: 8080
          - path: /PublicTokens
            pathType: Prefix
            backend:
              service:
                name: cmsapi
                port:
                  number: 8080
          - path: /Media
            pathType: Prefix
            backend:
              service:
                name: cmsapi
                port:
                  number: 8080
          - path: /swagger
            pathType: Prefix
            backend:
              service:
                name: cmsapi
                port:
                  number: 8080
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: cmsapi
                port:
                  number: 8080
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: cmsapi
                port:
                  number: 8080
          # SPA fallback — deve ser o último
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cmsui
                port:
                  number: 8080
