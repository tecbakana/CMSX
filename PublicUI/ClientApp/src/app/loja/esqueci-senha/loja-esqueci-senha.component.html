<div class="container-fluid py-4" style="max-width:480px">
  <div class="card">
    <div class="card-header fw-semibold">Esqueci a senha</div>
    <div class="card-body">

      <div *ngIf="sucesso" class="alert alert-success py-2 small">{{ sucesso }}</div>
      <div *ngIf="erro" class="alert alert-danger py-2 small">{{ erro }}</div>

      <form *ngIf="!sucesso" (ngSubmit)="enviar()" #f="ngForm">
        <p class="text-muted small mb-3">Informe seu e-mail e enviaremos as instruções para redefinir sua senha.</p>
        <div class="mb-3">
          <label class="form-label">E-mail</label>
          <input class="form-control" type="email" [(ngModel)]="email" name="email" required autocomplete="email" />
        </div>
        <button type="submit" class="btn btn-primary w-100" [disabled]="carregando || !f.valid">
          {{ carregando ? 'Enviando...' : 'Enviar instruções' }}
        </button>
      </form>

      <div class="mt-3 text-center">
        <a routerLink="/loja/login" class="small text-muted">Voltar para o login</a>
      </div>
    </div>
  </div>
</div>
