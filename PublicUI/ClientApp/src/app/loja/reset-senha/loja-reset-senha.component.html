<div class="container-fluid py-4" style="max-width:480px">
  <div class="card">
    <div class="card-header fw-semibold">Redefinir senha</div>
    <div class="card-body">

      <div *ngIf="sucesso" class="alert alert-success py-2 small">{{ sucesso }}</div>
      <div *ngIf="erro" class="alert alert-danger py-2 small">{{ erro }}</div>

      <div *ngIf="!token" class="alert alert-warning py-2 small">
        Link inválido. Solicite um novo link de redefinição de senha.
      </div>

      <form *ngIf="token && !sucesso" (ngSubmit)="redefinir()" #f="ngForm">
        <div class="mb-3">
          <label class="form-label">Nova senha</label>
          <input class="form-control" type="password" [(ngModel)]="novaSenha" name="novaSenha" required minlength="6" autocomplete="new-password" />
        </div>
        <div class="mb-3">
          <label class="form-label">Confirmar senha</label>
          <input class="form-control" type="password" [(ngModel)]="confirmarSenha" name="confirmarSenha" required minlength="6" autocomplete="new-password" />
        </div>
        <button type="submit" class="btn btn-primary w-100" [disabled]="carregando || !f.valid">
          {{ carregando ? 'Salvando...' : 'Redefinir senha' }}
        </button>
      </form>

      <div class="mt-3 text-center">
        <a routerLink="/loja/login" class="small text-muted">Voltar para o login</a>
      </div>
    </div>
  </div>
</div>
